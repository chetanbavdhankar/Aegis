<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS Crisis Intelligence Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --void: #0a0a0f;
            --surface: #12121a;
            --surface-elevated: #1a1a24;
            --border: #2a2a3a;
            --border-active: #3d3d52;
            --text-dim: #6b6b80;
            --text-sec: #9898a8;
            --text-pri: #e8e8f0;
            --text-bright: #ffffff;
            --cyan: #00d4ff;
            --cyan-dim: #0099bb;
            --cyan-glow: rgba(0, 212, 255, 0.15);
            --critical: #ff3b3b;
            --critical-glow: rgba(255, 59, 59, 0.15);
            --warning: #ffaa00;
            --warning-glow: rgba(255, 170, 0, 0.15);
            --safe: #00ff88;
            --safe-glow: rgba(0, 255, 136, 0.15);
            --accent-purple: #a855f7;
            --accent-pink: #ec4899;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--void);
            color: var(--text-pri);
            font-family: var(--font-body);
        }

        /* --- BACKGROUND ANIMATIONS --- */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(60px, 60px);
            }
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-1 {
            top: -200px;
            right: -100px;
            background: var(--cyan);
            animation: pulse1 8s ease-in-out infinite;
        }

        .bg-glow-2 {
            bottom: -200px;
            left: -100px;
            background: var(--accent-purple);
            animation: pulse2 10s ease-in-out infinite;
        }

        @keyframes pulse1 {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(1);
            }

            50% {
                opacity: 0.35;
                transform: scale(1.1);
            }
        }

        @keyframes pulse2 {

            0%,
            100% {
                opacity: 0.15;
                transform: scale(1);
            }

            50% {
                opacity: 0.25;
                transform: scale(1.15);
            }
        }

        /* --- LAYOUT --- */
        .app-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* --- HEADER --- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(20px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--cyan), var(--accent-purple));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
            box-shadow: 0 4px 20px var(--cyan-glow);
        }

        .logo-text h1 {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-bright), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text span {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .header-stats {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 600;
            color: var(--cyan);
            line-height: 1;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--critical-glow);
            border: 1px solid rgba(255, 59, 59, 0.3);
            border-radius: 100px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--critical);
            border-radius: 50%;
            animation: livePulse 1.5s ease-in-out infinite;
        }

        @keyframes livePulse {

            0%,
            100% {
                opacity: 1;
                box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.5);
            }

            50% {
                opacity: 0.7;
                box-shadow: 0 0 0 8px rgba(255, 59, 59, 0);
            }
        }

        /* --- PANELS --- */
        .main-content {
            display: grid;
            grid-template-columns: 380px 1fr 320px;
            gap: 20px;
            min-height: 0;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: border-color 0.3s ease;
        }

        .panel:hover {
            border-color: var(--border-active);
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .panel-title {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-pri);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--cyan);
            border-radius: 2px;
        }

        .panel-badge {
            font-family: var(--font-mono);
            font-size: 11px;
            padding: 4px 10px;
            background: var(--cyan-glow);
            color: var(--cyan);
            border-radius: 100px;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* --- SEVERITY BARS --- */
        .severity-bars {
            margin-bottom: 24px;
        }

        .severity-bar {
            margin-bottom: 16px;
        }

        .severity-bar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .severity-bar-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .severity-bar-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .severity-bar-dot.critical {
            background: var(--critical);
            box-shadow: 0 0 8px var(--critical);
        }

        .severity-bar-dot.warning {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        .severity-bar-dot.safe {
            background: var(--safe);
            box-shadow: 0 0 8px var(--safe);
        }

        .severity-bar-value {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 700;
        }

        .severity-bar-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .severity-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .severity-bar-fill.critical {
            background: var(--critical);
        }

        .severity-bar-fill.warning {
            background: var(--warning);
        }

        .severity-bar-fill.safe {
            background: var(--safe);
        }

        /* --- INTERACTIVE BUTTONS --- */
        .action-btn {
            position: relative;
            width: 100%;
            padding: 14px 20px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface-elevated);
            color: var(--text-pri);
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            margin-bottom: 10px;
            -webkit-user-select: none;
            user-select: none;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transition: 0.5s;
        }

        .action-btn:hover::after {
            left: 100%;
        }

        .action-btn:hover {
            border-color: var(--cyan);
            background: var(--cyan-glow);
            color: var(--cyan);
            transform: translateY(-1px);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--cyan), var(--accent-purple));
            border: none;
            color: white;
            font-weight: 600;
        }

        .action-btn.primary:hover {
            box-shadow: 0 4px 20px var(--cyan-glow), 0 0 0 1px rgba(255, 255, 255, 0.1);
            filter: brightness(1.1);
        }

        /* --- GLITCH EFFECT --- */
        @keyframes glitch {
            0% {
                transform: translate(0);
            }

            20% {
                transform: translate(-2px, 2px);
            }

            40% {
                transform: translate(-2px, -2px);
            }

            60% {
                transform: translate(2px, 2px);
            }

            80% {
                transform: translate(2px, -2px);
            }

            100% {
                transform: translate(0);
            }
        }

        .glitch-on-click:active {
            animation: glitch 0.2s linear infinite;
        }

        /* --- ALERT CARDS --- */
        .alert-card {
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .alert-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 4px 0 0 4px;
            transition: width 0.3s ease;
        }

        .alert-card.critical::before {
            background: var(--critical);
        }

        .alert-card.warning::before {
            background: var(--warning);
        }

        .alert-card.safe::before {
            background: var(--safe);
        }

        .alert-card:hover {
            border-color: var(--border-active);
            transform: translateX(8px);
            background: rgba(255, 255, 255, 0.03);
        }

        .alert-card:hover::before {
            width: 8px;
        }

        .alert-card.active {
            border-color: var(--cyan);
            box-shadow: 0 0 20px var(--cyan-glow);
        }

        /* --- CUSTOM NOTIFICATION SYSTEM --- */
        #notification-container {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .terminal-note {
            background: var(--surface);
            border: 1px solid var(--cyan);
            border-radius: 8px;
            padding: 12px 20px;
            color: var(--cyan);
            font-family: var(--font-mono);
            font-size: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px var(--cyan-glow);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: noteIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: all;
        }

        @keyframes noteIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .terminal-note.exit {
            animation: noteOut 0.3s ease forwards;
        }

        @keyframes noteOut {
            to {
                transform: translateY(-20px) scale(0.9);
                opacity: 0;
            }
        }

        /* --- SCANNING OVERLAY --- */
        #scan-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 212, 255, 0.05);
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #scan-overlay::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, var(--cyan), transparent);
            opacity: 0.1;
            animation: none;
        }

        .scanning #scan-overlay {
            opacity: 1;
        }

        .scanning #scan-overlay::after {
            animation: scanline 2s linear infinite;
        }

        @keyframes scanline {
            from {
                top: -100%;
            }

            to {
                top: 100%;
            }
        }

        /* --- MAP & CHARTS --- */
        #map {
            height: 100%;
            border-radius: 12px;
            background: var(--void);
        }

        .leaflet-container {
            border-radius: 12px;
        }

        .chart-container {
            height: 160px;
            padding: 0px;
            margin-bottom: 20px;
        }

        /* --- FORM --- */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-pri);
            font-family: var(--font-body);
            font-size: 14px;
            transition: all 0.2s ease;
            min-height: 80px;
            resize: none;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--cyan-dim);
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div id="scan-overlay"></div>
    <div id="notification-container"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">◆</div>
                <div class="logo-text">
                    <h1>AEGIS</h1>
                    <span>Crisis Intelligence Terminal</span>
                </div>
            </div>

            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalAlerts">247</div>
                    <div class="stat-label">Total Alerts</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="respondersActive">12</div>
                    <div class="stat-label">Responders</div>
                </div>
            </div>

            <div class="live-indicator">
                <div class="live-dot"></div>
                <span class="live-text"
                    style="font-family: var(--font-mono); font-size: 12px; color: var(--critical);">LIVE</span>
                <span id="clock"
                    style="font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); margin-left: 10px;">--:--:--
                    UTC</span>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Left: Alert Feed -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Active Alerts</span>
                    <span class="panel-badge" id="alertCount">6</span>
                </div>
                <div class="panel-content" id="alertFeed">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Center: Map -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Global Tactical Overlay</span>
                    <span id="system-status"
                        style="font-size: 10px; color: var(--safe); font-family: var(--font-mono);">● SYS_READY</span>
                </div>
                <div class="panel-content" style="padding: 0;">
                    <div id="map"></div>
                </div>
            </div>

            <!-- Right: Analytics & Input -->
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Mission Intelligence</span>
                </div>
                <div class="panel-content">
                    <!-- Severity Bars (Restored) -->
                    <div class="severity-bars">
                        <div class="severity-bar">
                            <div class="severity-bar-header">
                                <span class="severity-bar-label">
                                    <span class="severity-bar-dot critical"></span>
                                    Critical
                                </span>
                                <span class="severity-bar-value" style="color: var(--critical);"
                                    id="criticalCount">3</span>
                            </div>
                            <div class="severity-bar-track">
                                <div class="severity-bar-fill critical" id="criticalBar" style="width: 50%;"></div>
                            </div>
                        </div>
                        <div class="severity-bar">
                            <div class="severity-bar-header">
                                <span class="severity-bar-label">
                                    <span class="severity-bar-dot warning"></span>
                                    Moderate
                                </span>
                                <span class="severity-bar-value" style="color: var(--warning);"
                                    id="warningCount">2</span>
                            </div>
                            <div class="severity-bar-track">
                                <div class="severity-bar-fill warning" id="warningBar" style="width: 33%;"></div>
                            </div>
                        </div>
                        <div class="severity-bar">
                            <div class="severity-bar-header">
                                <span class="severity-bar-label">
                                    <span class="severity-bar-dot safe"></span>
                                    Normal
                                </span>
                                <span class="severity-bar-value" style="color: var(--safe);" id="safeCount">1</span>
                            </div>
                            <div class="severity-bar-track">
                                <div class="severity-bar-fill safe" id="safeBar" style="width: 17%;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>

                    <div style="margin: 20px 0;">
                        <div class="form-group">
                            <label class="form-label">Terminal Input</label>
                            <textarea class="form-textarea" id="emergencyMessage"
                                placeholder="Transmit situation report..."></textarea>
                        </div>
                        <button class="action-btn primary glitch-on-click" onclick="submitEmergency()">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                            </svg>
                            SUBMIT_ENCRYPTED
                        </button>
                    </div>

                    <div class="quick-actions" style="border-top: 1px solid var(--border); padding-top: 20px;">
                        <button class="action-btn glitch-on-click" onclick="broadcastAlert()">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path
                                    d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" />
                            </svg>
                            AUDIO_BROADCAST
                        </button>
                        <button class="action-btn glitch-on-click" onclick="refreshData()">
                            <svg id="refresh-icon" width="16" height="16" fill="none" stroke="currentColor"
                                stroke-width="2" viewBox="0 0 24 24">
                                <path
                                    d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
                            </svg>
                            SYNC_REMOTES
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const alerts = [
            { id: 1, type: 'SEISMIC', location: 'Izmir, Turkey', message: 'Mag 5.8 earthquake. Coastal damage reported.', severity: 'critical', lat: 38.4192, lng: 27.1287 },
            { id: 2, type: 'FLOOD', location: 'Valencia, Spain', message: 'Flash flooding. Vehicles stranded.', severity: 'critical', lat: 39.4699, lng: -0.3763 },
            { id: 3, type: 'FIRE', location: 'Los Angeles, USA', message: 'Wildfire spreading. Evacuations in progress.', severity: 'critical', lat: 34.0522, lng: -118.2437 },
            { id: 4, type: 'MEDICAL', location: 'Rome, Italy', message: 'MCI at Central Station. Multiple injuries.', severity: 'warning', lat: 41.9028, lng: 12.4964 },
            { id: 5, type: 'STORM', location: 'Lisbon, Portugal', message: 'Severe storm warning. 120km/h winds.', severity: 'warning', lat: 38.7223, lng: -9.1393 },
            { id: 6, type: 'TREMOR', location: 'Athens, Greece', message: 'Minor tremor. No damage reported.', severity: 'safe', lat: 37.9838, lng: 23.7275 }
        ];

        let map, chart;

        // --- CORE FUNCTIONS ---

        function init() {
            initMap();
            initChart();
            renderAlerts();
            updateClock();
            setInterval(updateClock, 1000);
            notify("TERMINAL INITIALIZED. WELCOME, OPERATOR.", "safe");
        }

        function initMap() {
            map = L.map('map', { center: [20, 0], zoom: 2, zoomControl: false });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            alerts.forEach(a => {
                const color = a.severity === 'critical' ? '#ff3b3b' : a.severity === 'warning' ? '#ffaa00' : '#00ff88';
                const marker = L.circleMarker([a.lat, a.lng], {
                    radius: 8, fillColor: color, color: color, weight: 2, fillOpacity: 0.4
                }).addTo(map);

                marker.bindPopup(`<b style="color:${color}">${a.type}</b><br>${a.location}`);
            });
        }

        function initChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['00', '04', '08', '12', '16', '20', '24'],
                    datasets: [{
                        data: [12, 19, 14, 25, 22, 18, 12],
                        borderColor: '#00d4ff',
                        backgroundColor: 'rgba(0, 212, 255, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#6b6b80', font: { size: 9, family: 'JetBrains Mono' } } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#6b6b80', font: { size: 9, family: 'JetBrains Mono' } } }
                    }
                }
            });
        }

        function renderAlerts() {
            const container = document.getElementById('alertFeed');
            container.innerHTML = alerts.map(a => `
                <div class="alert-card ${a.severity}" id="alert-${a.id}" onclick="selectAlert(${a.id})">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span style="font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--text-sec)">[${a.type}]</span>
                        <span style="font-family:var(--font-mono); font-size:10px; color:var(--text-dim)">T-MINUS 2M</span>
                    </div>
                    <div style="font-weight:700; margin-bottom:4px;">${a.location}</div>
                    <div style="font-size:12px; color:var(--text-sec); line-height:1.4">${a.message}</div>
                </div>
            `).join('');
        }

        // --- INTERACTION HANDLERS ---

        function notify(msg, type = "cyan") {
            const container = document.getElementById('notification-container');
            const note = document.createElement('div');
            note.className = 'terminal-note';
            if (type !== 'cyan') note.style.borderColor = `var(--${type})`;
            if (type !== 'cyan') note.style.color = `var(--${type})`;
            if (type !== 'cyan') note.style.boxShadow = `0 10px 30px rgba(0,0,0,0.5), 0 0 15px var(--${type}-glow)`;

            note.innerHTML = `
                <span style="font-size:14px">⚡</span>
                <span>${msg}</span>
            `;
            container.appendChild(note);
            setTimeout(() => {
                note.classList.add('exit');
                setTimeout(() => note.remove(), 300);
            }, 4000);
        }

        function selectAlert(id) {
            document.querySelectorAll('.alert-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`alert-${id}`).classList.add('active');
            const a = alerts.find(x => x.id === id);
            map.flyTo([a.lat, a.lng], 8, { duration: 1.5 });
            notify(`FOCUSING COORDINATES: ${a.lat}, ${a.lng}`, "cyan");
        }

        async function refreshData() {
            document.body.classList.add('scanning');
            const icon = document.getElementById('refresh-icon');
            icon.style.transition = 'transform 1s linear';
            icon.style.transform = 'rotate(360deg)';

            notify("SYNCHRONIZING WITH GLOBAL NODES...", "cyan");

            await new Promise(r => setTimeout(r, 2000));

            document.body.classList.remove('scanning');
            icon.style.transform = 'rotate(0deg)';
            icon.style.transition = 'none';
            notify("REMOTE SYNC COMPLETE. 0 ERRORS.", "safe");
        }

        function submitEmergency() {
            const msg = document.getElementById('emergencyMessage').value;
            if (!msg.trim()) {
                notify("ERROR: EMPTY BUFFER. INPUT REQUIRED.", "critical");
                return;
            }

            notify("ENCRYPTING PACKET...", "warning");
            setTimeout(() => {
                notify("TRANSMISSION SUCCESSFUL.", "safe");
                document.getElementById('emergencyMessage').value = '';
            }, 1000);
        }

        function broadcastAlert() {
            notify("OPENING VOICE COMM-LINK...", "warning");
            setTimeout(() => {
                notify("BROADCASTING TO LOCAL RESPONDERS.", "critical");
            }, 800);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
        }

        window.onload = init;
    </script>
</body>

</html>
